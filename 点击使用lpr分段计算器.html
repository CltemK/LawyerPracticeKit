<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPR 分段利息计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus, input[type="date"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .result-section {
            margin-top: 30px;
        }
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .summary-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .summary-amount {
            font-size: 36px;
            font-weight: 700;
        }
        .summary-details {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .summary-item {
            font-size: 14px;
        }
        .summary-item span {
            opacity: 0.9;
        }
        .summary-item strong {
            display: block;
            font-size: 18px;
            margin-top: 5px;
        }
        .segments-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        .segments-table th {
            background: #f0f0f0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }
        .segments-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .segments-table tr:hover {
            background: #f9f9f9;
        }
        .rate-display {
            color: #667eea;
            font-weight: 600;
        }
        .interest-display {
            color: #28a745;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        .hidden {
            display: none;
        }
        .lpr-type-note {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .settings-toggle {
            text-align: center;
            margin-bottom: 20px;
        }
        .settings-toggle a {
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .settings-toggle a:hover {
            text-decoration: underline;
        }
        .settings-section {
            background: #fff9e6;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #ffe082;
        }
        .settings-title {
            font-size: 16px;
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .setting-item {
            margin-bottom: 15px;
        }
        .setting-item:last-child {
            margin-bottom: 0;
        }
        .setting-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }
        .setting-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        .radio-label input[type="radio"] {
            margin: 0;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .checkbox-label input[type="checkbox"] {
            margin: 0;
        }
        .coefficient-input {
            width: 100px !important;
            padding: 8px 10px !important;
        }
        .btn-export {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        .btn-export svg {
            width: 18px;
            height: 18px;
        }
        .export-section {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LPR 分段利息计算器</h1>
        <p class="subtitle">自动根据日期匹配对应 LPR 利率，精确计算分段利息</p>
        <div style="text-align: right; margin-bottom: 15px;">
            <a href="data-manager.html" style="color: #667eea; font-size: 14px; text-decoration: none;">
                ⚙️ 管理 LPR 数据
            </a>
        </div>

        <div class="input-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="principal">本金金额（元）</label>
                    <input type="number" id="principal" placeholder="请输入本金金额" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label for="lprType">LPR 类型</label>
                    <select id="lprType">
                        <option value="1year">1年期 LPR</option>
                        <option value="5year">5年期以上 LPR</option>
                    </select>
                    <p class="lpr-type-note">1年期适用于短期贷款，5年期以上适用于房贷等长期贷款</p>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">起息日</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label for="endDate">止息日</label>
                    <input type="date" id="endDate">
                </div>
            </div>

            <!-- 中间还款区域 -->
            <div class="repayment-section" style="margin: 20px 0; padding: 15px; background: #e8f4fd; border-radius: 8px; border: 1px solid #b3d9ff;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="font-weight: 600; color: #0066cc;">中间还款（可选）</label>
                    <button type="button" class="btn btn-small" onclick="addRepaymentRow()" style="background: #0066cc; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">+ 添加还款</button>
                </div>
                <div id="repaymentList">
                    <!-- 动态添加还款记录 -->
                </div>
                <p class="lpr-type-note" style="margin-top: 10px;">添加中间还款后，系统将分段计算利息</p>
            </div>

            <div class="settings-toggle">
                <a onclick="toggleSettings()">⚙️ 高级设置</a>
            </div>

            <div id="settingsSection" class="settings-section hidden">
                <div class="settings-title">
                    <span>高级计算选项</span>
                </div>

                <div class="setting-item">
                    <label class="setting-label">计息方式</label>
                    <div class="setting-options">
                        <label class="radio-label">
                            <input type="radio" name="countEndDay" value="include" checked>
                            算头算尾（止息日计息）
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="countEndDay" value="exclude">
                            算头不算尾（止息日不计息）
                        </label>
                    </div>
                </div>

                <div class="setting-item">
                    <label class="setting-label">年天数基准</label>
                    <div class="setting-options">
                        <label class="radio-label">
                            <input type="radio" name="yearDays" value="365" checked>
                            365天
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="yearDays" value="360">
                            360天
                        </label>
                    </div>
                </div>

                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useStartDateLPR">
                        按起始日适用的LPR计算（不分段，整个期间使用起始日的LPR利率）
                    </label>
                </div>

                <div class="setting-item">
                    <label class="setting-label">利息系数</label>
                    <div class="setting-options" style="align-items: center;">
                        <input type="number" id="interestCoefficient" class="coefficient-input" value="1" step="0.01" min="0">
                        <span style="font-size: 13px; color: #666;">最终利息 = 计算利息 × 系数（常用于违约金计算等场景）</span>
                    </div>
                </div>
            </div>

            <button class="btn-primary" onclick="calculate()">计算分段利息</button>
        </div>

        <div id="resultSection" class="result-section hidden">
            <div class="summary-card">
                <div class="summary-title">利息总额</div>
                <div class="summary-amount" id="totalInterest">¥0.00</div>
                <div class="summary-details">
                    <div class="summary-item">
                        <span>本金</span>
                        <strong id="summaryPrincipal">¥0.00</strong>
                    </div>
                    <div class="summary-item">
                        <span>计息天数</span>
                        <strong id="summaryDays">0天</strong>
                    </div>
                    <div class="summary-item">
                        <span>平均年利率</span>
                        <strong id="avgRate">0%</strong>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color: #333;">分段计算明细</h3>
                <button class="btn-export" onclick="exportToExcel()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    导出 Excel 报表
                </button>
            </div>
            <table class="segments-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>开始日期</th>
                        <th>结束日期</th>
                        <th>天数</th>
                        <th>适用利率</th>
                        <th>LPR数据出处</th>
                        <th>分段利息</th>
                    </tr>
                </thead>
                <tbody id="segmentsBody">
                </tbody>
            </table>
        </div>

        <div id="emptyState" class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <p>输入本金和日期范围，点击计算按钮查看结果</p>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="lpr-data.js"></script>
    <script src="calculator.js"></script>
    <script>
        // 检查是否有用户自定义的 LPR 数据
        (function() {
            const saved = localStorage.getItem('lprData');
            if (saved) {
                console.log('已加载用户自定义 LPR 数据');
            }
        })();
    </script>
</body>
</html>
